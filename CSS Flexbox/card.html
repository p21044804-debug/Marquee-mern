 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
    }

    body {
      min-height: 100vh;
      display:flex;
      align-items: center;
      justify-content: center;
      background: #aabdb6;
      font-family: 'Nunito', sans-serif;
    }

    .card {
      width: 300px;
      background: #bfd6c7;
      border-radius: 40px 40px 20px 20px;
      box-shadow: 20px 20px 40px rgba(0, 49, 63, 0.13);
      overflow:hidden;
      padding-bottom: 27px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 6px;
    }
    .top-bar button {
      background: none;
      border: none;
      cursor: pointer;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: background 0.15s;
    }
    .top-bar button:hover { background: #f3f4f6; }
    .arrow-icon {
      width: 18px; height: 18px;
      display: block;
    }
    .dots-icon {
      display: flex;
      flex-direction: column;
      gap: 2.5px;
      align-items: center;
    }
    .dots-icon span {
      display: block;
      width: 4px; height: 4px;
      background: #060606;
      border-radius: 50%;
    }

    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0 0;
    }
    .avatar-outer {
      position: relative;
      width: 96px; height: 96px;
    }
    .avatar-outer img,
    .avatar-outer .avatar-fallback {
      width: 96px; height: 96px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      box-shadow: 0 4px 18px rgba(0,0,0,0.13);
      border: 3px solid #9baba5;
    }
    .avatar-outer .avatar-fallback {
      background: linear-gradient(145deg, #101011, #9ca3af);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
      color: #595151;
      line-height: 1;
    }
    /* magnify icon under avatar */
    .magnify {
      position: absolute;
      bottom: -1px; left: 50%;
      transform: translateX(-50%);
      width: 22px; height: 22px;
      background: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .magnify svg { width: 12px; height: 12px; }

    .profile-name {
      margin-top: 18px;
      font-size: 22px;
      font-weight: 800;
      color: #1f2937;
      letter-spacing: -0.2px;
    }
    .profile-bio {
      margin-top: 4px;
      font-size: 13px;
      font-weight: 500;
      color: #5a5b5d;
      letter-spacing: 0.1px;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
      padding: 0 24px;
    }
    .soc-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: #000000;
      border: 1.5px solid #8ba6dd;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      text-decoration: none;
    }
    .soc-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
    }
    .soc-btn svg { width: 20px; height: 20px; display: block; }

    .actions {
      display: flex;
      gap: 10px;
      margin: 20px 22px 0;
    }
    .act-btn {
      flex: 1;
      height: 46px;
      border-radius: 12px;
      border: 1.5px solid #c1c2c4;
      background: #597476;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #000000;
      cursor: pointer;
      letter-spacing: 0.1px;
      transition: background 0.15s, transform 0.13s, box-shadow 0.15s;
    }
    .act-btn:hover {
      background: #80ad94;
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(1, 1, 1, 0.07);
    }
    .act-btn:active { transform: scale(0.97); }

    .stats {
      display: flex;
      align-items: center;
      justify-content: space-evenly;
      margin-top: 22px;
      padding: 0 10px;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: default;
    }
    .stat-item svg { width: 18px; height: 18px; }
    .stat-item span {
      font-size: 14px;
      font-weight: 700;
      color: #343e4d;
    }
    .stat-divider {
      width: 1px;
      height: 22px;
      background: #adb1b8;
    }
  </style>
</head>
<body>

<div class="card">

  <div class="top-bar">
    <button aria-label="Back">
      <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <button aria-label="More options">
      <div class="dots-icon">
        <span></span><span></span><span></span>
      </div>
    </button>
  </div>

  <div class="avatar-section">
    <div class="avatar-outer">
      <img src="https://img.magnific.com/premium-photo/cute-anime-boy-wallpaper_776894-110627.jpg?semt=ais_hybrid&w=740&q=80" alt="Profile"/>
      <div class="magnify">
        <svg viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <line x1="16.5" y1="16.5" x2="22" y2="22"/>
          <line x1="11" y1="8" x2="11" y2="14"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </div>
    </div>
    <h1 class="profile-name">Pavan Patel</h1>
    <p class="profile-bio"><b>Coder  &amp; Context Engineer</b></p>
  </div>

  <div class="socials">
    <a href="#" class="soc-btn" title="Facebook">
      <svg viewBox="0 0 24 24" fill="#1877f2">
        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
      </svg>
    </a>
    <a href="#" class="soc-btn" title="Twitter">
      <svg viewBox="0 0 24 24" fill="#1da1f2">
        <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53A4.48 4.48 0 0 0 22.46.6a9 9 0 0 1-2.88 1.1A4.52 4.52 0 0 0 16.11 0c-2.5 0-4.52 2.02-4.52 4.52 0 .35.04.7.11 1.03C7.69 5.37 4.07 3.58 1.64.9a4.52 4.52 0 0 0-.61 2.27c0 1.57.8 2.95 2.01 3.76a4.5 4.5 0 0 1-2.05-.57v.06c0 2.19 1.56 4.02 3.63 4.43a4.54 4.54 0 0 1-2.04.08c.57 1.79 2.24 3.09 4.21 3.13A9.07 9.07 0 0 1 0 19.54a12.8 12.8 0 0 0 6.92 2.03c8.3 0 12.85-6.88 12.85-12.85 0-.2 0-.39-.01-.58A9.17 9.17 0 0 0 23 3z"/>
      </svg>
    </a>
    <a href="#" class="soc-btn" title="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="#e1306c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke-width="2.5"/>
      </svg>
    </a>
    <a href="#" class="soc-btn" title="YouTube">
      <svg viewBox="0 0 24 24" fill="#ff0000">
        <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.97C18.88 4 12 4 12 4s-6.88 0-8.59.45A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.97C5.12 20 12 20 12 20s6.88 0 8.59-.45a2.78 2.78 0 0 0 1.95-1.97A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/>
        <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#fff"/>
      </svg>
    </a>
  </div>
  <div class="actions">
    <button class="act-btn">Message</button>
    <button class="act-btn">Subscribe</button>
  </div>
  <div class="stats">
    <div class="stat-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>10.8k</span>
    </div>

    <div class="stat-divider"></div>
    <div class="stat-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>5.7k</span>
    </div>

    <div class="stat-divider"></div>

    <div class="stat-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2.5"  stroke-linejoin="round">
        <polyline points="15 17 20 12 15 7"/>
        <path d="M4 18v-2a4 4 0 0 1 4-4h12"/>
      </svg>
      <span>2.10k</span>
    </div>
  </div>

</div>

</body>
</html>
